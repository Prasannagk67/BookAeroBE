services:
  - type: web
    name: keycloak-service
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    port: 9091  # Explicitly tell Render which port to use
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin123
    autoDeploy: true