services:
  - type: web
    name: keycloak-service
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    port: 10000  # matches default PORT value in Render
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin123
      - key: PORT
        value: 10000  # optional unless you want to override
    autoDeploy: true
